spring.application.name=demo
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.0-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
# ===============================
# CONFIGURACIÓN DE DATOS (BASE DE DATOS)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# 'none' para evitar que Hibernate intente modificar el esquema en cada inicio
# cámbialo a 'update' temporalmente si añades nuevas entidades o columnas
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en la consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optimizaciones de Rendimiento
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# Evita problemas de conexión con el pool de Hikari
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Desactivar el soporte automático de Docker Compose
spring.docker.compose.enabled=false

#JWT AUTH
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
google.client-id=${GOOGLE_CLIENT_ID}

storage.location=src/main/resources/static/uploads
spring.web.resources.static-locations=classpath:/static/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#GEMINI API MODERATION
gemini.api.key=${GEMINI_API_KEY}

#EMAIL API

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true